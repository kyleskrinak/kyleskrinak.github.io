name: PR Visual Regression Check

on:
  pull_request:
    branches:
      - staging
      - main

permissions:
  contents: read
  actions: read        # for downloading baseline artifact
  pull-requests: write # for commenting on PR with results

concurrency:
  group: visual-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual-regression:
    name: Visual regression test against main baseline
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: ./.github/actions/setup-node-build

      - name: Install dependencies
        run: npm ci

      - name: Build site (PR code)
        run: npm run build:ci
        env:
          BUILD_ENV: production
          PUBLIC_DEPLOY_ENV: production
          SITE_URL: https://kyle.skrinak.com/
          # Note: Build with production settings to match baseline generated by production-deploy.yml
          # This ensures canonical URLs and meta tags match for accurate visual comparison

      - name: Download baseline from main
        id: download-baseline
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          workflow: production-deploy.yml
          branch: main
          name: visual-baseline-main
          path: tests/visual/visual-regression.spec.ts-snapshots/
          if_no_artifact_found: warn

      - name: Check baseline availability
        id: baseline-check
        run: |
          if [ -d "tests/visual/visual-regression.spec.ts-snapshots" ] && [ "$(ls -A tests/visual/visual-regression.spec.ts-snapshots)" ]; then
            echo "baseline_exists=true" >> $GITHUB_OUTPUT
            echo "✅ Baseline downloaded successfully"
          else
            echo "baseline_exists=false" >> $GITHUB_OUTPUT
            echo "⚠️  No baseline found - this is expected for first run after enabling visual regression"
            echo "   Skipping visual regression tests. Baseline will be created when PR merges to main."
          fi

      - name: Install Playwright browsers
        if: steps.baseline-check.outputs.baseline_exists == 'true'
        run: npx playwright install --with-deps chromium

      - name: Start preview server
        if: steps.baseline-check.outputs.baseline_exists == 'true'
        run: |
          npm run preview > preview-server.log 2>&1 &
          echo $! > preview-server.pid
        env:
          HOST: localhost
          PORT: 4321

      - name: Wait for preview server
        if: steps.baseline-check.outputs.baseline_exists == 'true'
        run: |
          timeout 30 sh -c 'until curl --silent --fail --show-error http://localhost:4321 > /dev/null; do
            if [ -f preview-server.pid ] && ! kill -0 $(cat preview-server.pid) 2>/dev/null; then
              echo "❌ Preview server died during startup"
              cat preview-server.log
              exit 1
            fi
            sleep 1
          done' || {
            echo "❌ Preview server failed to start within 30 seconds"
            [ -f preview-server.log ] && cat preview-server.log
            exit 1
          }

      - name: Run visual regression tests
        if: steps.baseline-check.outputs.baseline_exists == 'true'
        id: visual-test
        run: npm run test:visual
        env:
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:4321
        continue-on-error: true

      - name: Stop preview server
        if: always() && steps.baseline-check.outputs.baseline_exists == 'true'
        run: |
          if [ -f preview-server.pid ]; then
            kill $(cat preview-server.pid) 2>/dev/null || true
            rm preview-server.pid
          fi

      - name: Upload visual diff images
        if: steps.baseline-check.outputs.baseline_exists == 'true' && always() && steps.visual-test.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs-pr-${{ github.event.pull_request.number }}
          path: |
            test-results/
            playwright-report/
          retention-days: 30

      - name: Comment on PR with results
        if: steps.baseline-check.outputs.baseline_exists == 'true' && always() && steps.visual-test.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactUrl = `${runUrl}#artifacts`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## ⚠️ Visual Regression Detected\n\n` +
                    `Visual differences detected compared to main baseline.\n\n` +
                    `- [View diff images](${artifactUrl})\n` +
                    `- [Full test report](${runUrl})\n\n` +
                    `If these changes are intentional, the baseline will be updated when this PR is merged to main.`
            });

      - name: Fail workflow if visual diffs detected
        if: steps.baseline-check.outputs.baseline_exists == 'true' && steps.visual-test.outcome == 'failure'
        run: exit 1
