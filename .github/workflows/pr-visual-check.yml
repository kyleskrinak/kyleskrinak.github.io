name: PR Visual Regression Check

on:
  pull_request:
    branches:
      - staging

permissions:
  contents: read

concurrency:
  group: visual-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual-regression:
    name: Visual regression test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Skip fork PRs: untrusted code shouldn't run in a workflow with repo checkout access.
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        # Pinned to SHA (v4) — consistent supply-chain posture across all workflows.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: ./.github/actions/setup-node-build

      - name: Install dependencies
        run: npm ci

      - name: Validate configuration registry
        run: npm run config:validate

      - name: Build site (PR code)
        run: npm run build:ci
        env:
          BUILD_ENV: production
          PUBLIC_DEPLOY_ENV: production
          SITE_URL: https://kyle.skrinak.com/

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Start preview server
        run: |
          npx astro preview --host localhost --port 4321 > preview-server.log 2>&1 &
          echo $! > preview-server.pid

      - name: Wait for preview server
        run: |
          timeout 30 sh -c 'until curl --silent --fail --show-error http://localhost:4321 > /dev/null; do
            if [ -f preview-server.pid ] && ! kill -0 $(cat preview-server.pid) 2>/dev/null; then
              echo "Preview server died during startup"
              cat preview-server.log
              exit 1
            fi
            sleep 1
          done' || {
            echo "Preview server failed to start within 30 seconds"
            [ -f preview-server.log ] && cat preview-server.log
            exit 1
          }

      - name: Run visual regression tests
        run: npm run test:visual
        env:
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:4321

      - name: Stop preview server
        if: always()
        run: |
          if [ -f preview-server.pid ]; then
            kill $(cat preview-server.pid) 2>/dev/null || true
            rm preview-server.pid
          fi

      - name: Upload visual diff images
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs-pr-${{ github.event.pull_request.number }}
          path: |
            test-results/
            playwright-report/
          retention-days: 30
