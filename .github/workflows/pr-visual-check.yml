name: PR Visual Regression Check

on:
  pull_request:
    branches:
      - staging
      - main

concurrency:
  group: visual-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual-regression:
    name: Visual regression test against main baseline
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: ./.github/actions/setup-node-build

      - name: Install dependencies
        run: npm ci

      - name: Build site (PR code)
        run: npm run build:ci
        env:
          BUILD_ENV: production
          PUBLIC_DEPLOY_ENV: staging
          SITE_URL: https://kyleskrinak.github.io/

      - name: Download baseline from main
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: production-deploy.yml
          branch: main
          name: visual-baseline-main
          path: tests/visual/visual-regression.spec.ts-snapshots/
          # If no baseline exists yet, workflow will fail - this is expected for first run

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start preview server
        run: npm run preview &
        env:
          HOST: localhost
          PORT: 4321

      - name: Wait for preview server
        run: |
          timeout 30 sh -c 'until curl -s http://localhost:4321 > /dev/null; do sleep 1; done' || exit 1

      - name: Run visual regression tests
        id: visual-test
        run: npm run test:visual
        continue-on-error: true

      - name: Upload visual diff images
        if: failure() && steps.visual-test.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs-pr-${{ github.event.pull_request.number }}
          path: |
            test-results/
            playwright-report/
          retention-days: 30

      - name: Comment on PR with results
        if: failure() && steps.visual-test.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactUrl = `${runUrl}#artifacts`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## ⚠️ Visual Regression Detected\n\n` +
                    `Visual differences detected compared to main baseline.\n\n` +
                    `- [View diff images](${artifactUrl})\n` +
                    `- [Full test report](${runUrl})\n\n` +
                    `If these changes are intentional, the baseline will be updated when this PR is merged to main.`
            });

      - name: Fail workflow if visual diffs detected
        if: steps.visual-test.outcome == 'failure'
        run: exit 1
