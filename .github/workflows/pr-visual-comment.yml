name: PR Visual Regression Comment

on:
  workflow_run:
    workflows: ["PR Visual Regression Check"]
    types:
      - completed

permissions:
  pull-requests: write # Safe: runs in base branch context, not PR code
  actions: read

jobs:
  comment:
    name: Comment on PR with visual regression results
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'failure'

    steps:
      - name: Download PR metadata
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ${{ github.event.workflow_run.id }},
            });

            const metadataArtifact = artifacts.data.artifacts.find(
              a => a.name.startsWith('pr-metadata-')
            );

            if (!metadataArtifact) {
              console.log('No PR metadata artifact found - skipping comment');
              return;
            }

            const download = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: metadataArtifact.id,
              archive_format: 'zip',
            });

            const fs = require('fs');
            fs.writeFileSync('metadata.zip', Buffer.from(download.data));

      - name: Extract PR number
        id: pr
        run: |
          if [ -f metadata.zip ]; then
            unzip -q metadata.zip
            echo "number=$(cat pr-number.txt)" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR
        if: steps.pr.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.pr.outputs.number }};
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${{ github.event.workflow_run.id }}`;
            const artifactUrl = `${runUrl}#artifacts`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `## ⚠️ Visual Regression Detected\n\n` +
                    `Visual differences detected compared to main baseline.\n\n` +
                    `- [View diff images](${artifactUrl})\n` +
                    `- [Full test report](${runUrl})\n\n` +
                    `If these changes are intentional, the baseline will be updated when this PR is merged to main.`
            });
