name: PR Visual Regression Comment

on:
  workflow_run:
    workflows: ["PR Visual Regression Check"]
    types:
      - completed

permissions:
  issues: write # For commenting on PRs (issues and PRs share same permission)
  actions: read

jobs:
  comment:
    name: Comment on PR with visual regression results
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'

    steps:
      - name: Get PR number from workflow run
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            // Get PR number from workflow_run event (GitHub-controlled, secure)
            const pullRequests = context.payload.workflow_run.pull_requests;
            if (!pullRequests || pullRequests.length === 0) {
              console.log('No PR associated with this workflow run');
              return;
            }

            const prNumber = pullRequests[0].number;
            console.log(`Found PR #${prNumber}`);
            core.setOutput('number', prNumber);
            core.setOutput('found', 'true');

      - name: Comment on PR (idempotent)
        if: steps.pr.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ steps.pr.outputs.number }}');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${{ github.event.workflow_run.id }}`;
            const artifactUrl = `${runUrl}#artifacts`;
            const marker = '<!-- visual-regression-comment -->';

            const commentBody = `${marker}\n## ⚠️ Visual Regression Detected\n\n` +
                    `Visual differences detected compared to main baseline.\n\n` +
                    `- [View diff images](${artifactUrl})\n` +
                    `- [Full test report](${runUrl})\n\n` +
                    `If these changes are intentional, the baseline will be updated when this PR is merged to main.\n\n` +
                    `*Last updated: ${new Date().toISOString()}*`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existingComment = comments.find(c => c.body?.includes(marker));

            if (existingComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: commentBody,
              });
              console.log(`Updated existing comment #${existingComment.id}`);
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: commentBody,
              });
              console.log('Created new comment');
            }
