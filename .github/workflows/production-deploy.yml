name: Production (AWS S3 + CloudFront)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: prod-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build, verify, deploy
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://kyle.skrinak.com
    permissions:
      contents: read
      id-token: write  # needed for OIDC -> AWS
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: ./.github/actions/setup-node-build

      - name: Install dependencies
        run: npm ci

      - name: Validate configuration registry
        run: npm run config:validate

      - name: Check Cloudflare production token presence
        run: |
          if [ -n "${PUBLIC_CLOUDFLARE_ANALYTICS_TOKEN:-}" ]; then
            echo "Cloudflare production token is set (masked)."
          else
            echo "Cloudflare production token is NOT set."
          fi
        env:
          PUBLIC_CLOUDFLARE_ANALYTICS_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN_PROD }}

      - name: Build site
        run: npm run build:ci
        env:
          BUILD_ENV: production
          PUBLIC_DEPLOY_ENV: production
          SITE_URL: https://kyle.skrinak.com/
          PUBLIC_CLOUDFLARE_ANALYTICS_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN_PROD }}
          PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ secrets.GOOGLE_SITE_VERIFICATION_PROD }}
          PUBLIC_GOOGLE_ANALYTICS_ID: ${{ vars.GOOGLE_ANALYTICS_ID }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.AWS_DEPLOY_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}

      # Step 1: push long-lived assets first
      - name: Sync assets to S3 (1y immutable)
        run: |
          aws s3 sync "dist/" "s3://${{ vars.AWS_S3_BUCKET }}/" \
            --delete \
            --only-show-errors \
            --exclude "*" \
            --include "_astro/*" \
            --include "_pagefind/*" \
            --cache-control "max-age=31536000,public,immutable"

      # Step 2: push everything else (HTML + non-asset files) with a short cache
      # Excluding assets prevents this step from overwriting the long-lived headers from step 1.
      - name: Sync HTML to S3 (5m cache)
        run: |
          aws s3 sync "dist/" "s3://${{ vars.AWS_S3_BUCKET }}/" \
            --delete \
            --only-show-errors \
            --exclude "_astro/*" \
            --exclude "_pagefind/*" \
            --cache-control "max-age=300,public"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.AWS_CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/"

      # Generate visual regression baseline after successful deploy
      # Note: Baseline generation is non-blocking - failures won't fail the deploy
      - name: Install Playwright browsers
        continue-on-error: true
        run: npx playwright install --with-deps chromium

      - name: Start preview server
        continue-on-error: true
        run: |
          npx astro preview --host localhost --port 4321 > preview-server.log 2>&1 &
          echo $! > preview-server.pid

      - name: Wait for preview server
        continue-on-error: true
        run: |
          timeout 30 sh -c 'until curl --silent --fail --show-error http://localhost:4321 > /dev/null; do
            if [ -f preview-server.pid ] && ! kill -0 $(cat preview-server.pid) 2>/dev/null; then
              echo "❌ Preview server died during startup"
              cat preview-server.log
              exit 1
            fi
            sleep 1
          done' || {
            echo "❌ Preview server failed to start within 30 seconds"
            [ -f preview-server.log ] && cat preview-server.log
            exit 1
          }

      - name: Generate visual baseline snapshots
        id: baseline
        continue-on-error: true
        run: npm run test:visual:baseline
        env:
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:4321

      - name: Stop preview server
        if: always()
        run: |
          if [ -f preview-server.pid ]; then
            kill $(cat preview-server.pid) 2>/dev/null || true
            rm preview-server.pid
          fi

      - name: Upload visual baseline as artifact
        if: steps.baseline.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: visual-baseline-main
          path: tests/visual/visual-regression.spec.ts-snapshots/
          retention-days: 90
          # Note: Only upload if baseline generation fully succeeded
          # Partial/failed snapshots would break future PR comparisons
