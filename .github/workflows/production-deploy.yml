name: Production (AWS S3 + CloudFront)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: prod-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build, verify, deploy
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://kyle.skrinak.com
    permissions:
      contents: write  # ensure-release-pdfs reads/writes the release backing stores
      id-token: write  # needed for OIDC -> AWS
    steps:
      - name: Checkout
        # Pinned to SHA (v4) — consistent supply-chain posture across all workflows.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: ./.github/actions/setup-node-build

      - name: Install dependencies
        run: npm ci

      - name: Validate configuration registry
        run: npm run config:validate

      - name: Check Cloudflare production token presence
        # Informational only — logs presence/absence but does not fail the build.
        # Enforcement (exit 1 on missing) is in secrets-check.yml (workflow_dispatch).
        run: |
          if [ -n "${PUBLIC_CLOUDFLARE_ANALYTICS_TOKEN:-}" ]; then
            echo "Cloudflare production token is set (masked)."
          else
            echo "Cloudflare production token is NOT set."
          fi
        env:
          PUBLIC_CLOUDFLARE_ANALYTICS_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN_PROD }}

      - name: Build site
        run: npm run build:ci
        env:
          BUILD_ENV: production
          PUBLIC_DEPLOY_ENV: production
          SITE_URL: https://kyle.skrinak.com/
          PUBLIC_CLOUDFLARE_ANALYTICS_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN_PROD }}
          PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ secrets.GOOGLE_SITE_VERIFICATION_PROD }}
          PUBLIC_GOOGLE_ANALYTICS_ID: ${{ secrets.GOOGLE_ANALYTICS_ID }}

      # Runs AFTER the build: renders the PDFs from the built dist/ and writes
      # them into dist/ so the S3 sync picks them up. Production uses the
      # archive-pdfs / resume-pdf release tags as its backing stores.
      # bundle-test.html is excluded from the presentations PDF (it's a build
      # test artifact, not a deck), so it must not feed the hash either.
      - name: Ensure archive PDFs
        uses: ./.github/actions/ensure-release-pdfs
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: archive-pdfs
          title: Archive PDFs (automation backing store)
          hash-paths: |
            src/content/blog
            public/presentations
            src/pages/archive-book.astro
            src/utils/getBlogPosts.ts
            src/utils/postFilter.ts
            src/content.config.ts
            scripts/build-archive-pdf.mjs
            scripts/build-presentations-pdf.mjs
            src/config
          hash-exclude-names: |
            bundle-test.html
          assets: |
            blog-archive.pdf dist
            presentations-archive.pdf dist
          regen-command: |
            npm run archive:pdf -- --skip-build --output dist/blog-archive.pdf
            npm run archive:presentations -- --output dist/presentations-archive.pdf

      # The resume hash list includes the shared rendering inputs the print
      # route renders through (Layout, global CSS, site config, content
      # schema) — a change to any of these alters the printed page.
      # astro.config.ts churns ~monthly → ~one spurious regen/month; accepted tradeoff.
      - name: Ensure resume PDF
        uses: ./.github/actions/ensure-release-pdfs
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: resume-pdf
          title: Resume PDF (automation backing store)
          hash-paths: |
            src/content/pages/resume
            src/pages/resume/print/index.astro
            src/styles/resume.css
            scripts/print-resume-pdf.mjs
            scripts/lib/resume-render.mjs
            scripts/lib/pdf-helpers.mjs
            src/lib/remark-facets.mjs
            src/components/ResumeHeader.astro
            src/layouts/Layout.astro
            src/styles/global.css
            src/config
            src/content.config.ts
            astro.config.ts
          assets: |
            kyle-skrinak-resume.pdf dist/resume
          regen-command: |
            node scripts/print-resume-pdf.mjs --output dist/resume/kyle-skrinak-resume.pdf

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.AWS_DEPLOY_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}

      # Step 1: push long-lived assets first
      - name: Sync assets to S3 (1y immutable)
        run: |
          aws s3 sync "dist/" "s3://${{ vars.AWS_S3_BUCKET }}/" \
            --delete \
            --only-show-errors \
            --exclude "*" \
            --include "_astro/*" \
            --include "_pagefind/*" \
            --cache-control "max-age=31536000,public,immutable"

      # Step 2: push everything else (HTML + non-asset files) with a short cache
      # Excluding assets prevents this step from overwriting the long-lived headers from step 1.
      - name: Sync HTML to S3 (5m cache)
        run: |
          aws s3 sync "dist/" "s3://${{ vars.AWS_S3_BUCKET }}/" \
            --delete \
            --only-show-errors \
            --exclude "_astro/*" \
            --exclude "_pagefind/*" \
            --cache-control "max-age=300,public"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.AWS_CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/"
