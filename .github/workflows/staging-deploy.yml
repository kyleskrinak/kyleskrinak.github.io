name: Staging (GitHub Pages)

on:
  push:
    branches:
      - staging

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write  # ensure-release-pdfs reads/writes the release backing stores
    steps:
      - name: Checkout code
        # Pinned to SHA (v4) — consistent supply-chain posture across all workflows.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: ./.github/actions/setup-node-build

      - name: Install dependencies
        run: npm ci

      - name: Validate configuration registry
        run: npm run config:validate

      - name: Check Cloudflare staging token presence
        # Informational only — logs presence/absence but does not fail the build.
        # Enforcement (exit 1 on missing) is in secrets-check.yml (workflow_dispatch).
        run: |
          if [ -n "${PUBLIC_CLOUDFLARE_ANALYTICS_TOKEN:-}" ]; then
            echo "Cloudflare staging token is set (masked)."
          else
            echo "Cloudflare staging token is NOT set."
          fi
        env:
          PUBLIC_CLOUDFLARE_ANALYTICS_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN_STAGING }}

      - name: Build site
        run: npm run build:ci
        env:
          BUILD_ENV: production
          PUBLIC_DEPLOY_ENV: staging
          SITE_URL: https://kyleskrinak.github.io/
          PUBLIC_CLOUDFLARE_ANALYTICS_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN_STAGING }}

      # Runs AFTER the build (renders from the built dist/) but BEFORE the artifact
      # upload so the PDFs ship in the deployed artifact. Staging uses its own
      # release tags so it never shares prod's backing stores (no cross-env race).
      # bundle-test.html is excluded from the presentations PDF (it's a build
      # test artifact, not a deck), so it must not feed the hash either.
      - name: Ensure archive PDFs
        uses: ./.github/actions/ensure-release-pdfs
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: archive-pdfs-staging
          title: Archive PDFs (automation backing store)
          hash-paths: |
            src/content/blog
            public/presentations
            src/pages/archive-book.astro
            src/utils/getBlogPosts.ts
            src/utils/postFilter.ts
            src/content.config.ts
            scripts/build-archive-pdf.mjs
            scripts/build-presentations-pdf.mjs
            src/config
          hash-exclude-names: |
            bundle-test.html
          assets: |
            blog-archive.pdf dist
            presentations-archive.pdf dist
          regen-command: |
            npm run archive:pdf -- --skip-build --output dist/blog-archive.pdf
            npm run archive:presentations -- --output dist/presentations-archive.pdf

      # The resume hash list includes the shared rendering inputs the print
      # route renders through (Layout, global CSS, site config, content
      # schema) — a change to any of these alters the printed page.
      # astro.config.ts churns ~monthly → ~one spurious regen/month; accepted tradeoff.
      - name: Ensure resume PDF
        uses: ./.github/actions/ensure-release-pdfs
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: resume-pdf-staging
          title: Resume PDF (automation backing store)
          hash-paths: |
            src/content/pages/resume
            src/pages/resume/print/index.astro
            src/styles/resume.css
            scripts/print-resume-pdf.mjs
            scripts/lib/resume-render.mjs
            scripts/lib/pdf-helpers.mjs
            src/lib/remark-facets.mjs
            src/components/ResumeHeader.astro
            src/layouts/Layout.astro
            src/styles/global.css
            src/config
            src/content.config.ts
            astro.config.ts
          assets: |
            kyle-skrinak-resume.pdf dist/resume
          regen-command: |
            node scripts/print-resume-pdf.mjs --output dist/resume/kyle-skrinak-resume.pdf

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ./dist
          retention-days: 1

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: ./dist

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
