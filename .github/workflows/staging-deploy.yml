name: Staging (GitHub Pages)

on:
  push:
    branches:
      - staging

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write  # ensure-archive-pdfs reads/writes the release backing store
    steps:
      - name: Checkout code
        # Pinned to SHA (v4) — consistent supply-chain posture across all workflows.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: ./.github/actions/setup-node-build

      - name: Install dependencies
        run: npm ci

      - name: Validate configuration registry
        run: npm run config:validate

      - name: Check Cloudflare staging token presence
        # Informational only — logs presence/absence but does not fail the build.
        # Enforcement (exit 1 on missing) is in secrets-check.yml (workflow_dispatch).
        run: |
          if [ -n "${PUBLIC_CLOUDFLARE_ANALYTICS_TOKEN:-}" ]; then
            echo "Cloudflare staging token is set (masked)."
          else
            echo "Cloudflare staging token is NOT set."
          fi
        env:
          PUBLIC_CLOUDFLARE_ANALYTICS_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN_STAGING }}

      - name: Build site
        run: npm run build:ci
        env:
          BUILD_ENV: production
          PUBLIC_DEPLOY_ENV: staging
          SITE_URL: https://kyleskrinak.github.io/
          PUBLIC_CLOUDFLARE_ANALYTICS_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN_STAGING }}

      # Runs AFTER the build (renders from the built dist/) but BEFORE the artifact
      # upload so the PDFs ship in the deployed artifact. Staging uses its own
      # release tag so it never shares prod's backing store (no cross-env race).
      - name: Ensure archive PDFs
        uses: ./.github/actions/ensure-archive-pdfs
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: archive-pdfs-staging

      # Same post-build pattern as the archive PDFs: renders the resume PDF
      # from the built dist/ (hash-gated) and writes it into dist/resume/ so
      # it ships in the deployed artifact. Staging uses its own release tag so
      # it never shares prod's backing store (no cross-env race).
      - name: Ensure resume PDF
        uses: ./.github/actions/ensure-resume-pdf
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: resume-pdf-staging

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ./dist
          retention-days: 1

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: ./dist

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
